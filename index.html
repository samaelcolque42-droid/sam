<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUSTOM - Tienda Virtual</title>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- FontAwesome para Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #D4E600; /* Verde-limón KUSTOM */
            --bg-dark: #0A0A0A;
            --bg-card: #161616;
            --bg-input: #222222;
            --text-main: #FFFFFF;
            --text-muted: #AAAAAA;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- Barra de Navegación --- */
        header {
            background-color: rgba(10, 10, 10, 0.95);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--text-main);
            text-decoration: none;
        }

        .logo span {
            color: var(--primary);
        }

        .search-box {
            position: relative;
            width: 40%;
        }

        .search-box input {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid #333;
            padding: 10px 15px;
            border-radius: 4px;
            color: #fff;
            outline: none;
            transition: var(--transition);
        }

        .search-box input:focus {
            border-color: var(--primary);
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 18px;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
        }

        .nav-btn:hover {
            color: var(--primary);
        }

        /* --- Contenedor Principal con Margen Top --- */
        main {
            max-width: 1200px;
            margin: 90px auto 40px auto;
            padding: 0 20px;
        }

        /* --- Bloque Compra por Categoría --- */
        .section-title {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background-color: #222;
        }

        .grid-categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .category-card {
            background-color: var(--bg-card);
            padding: 30px 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 160px;
        }

        .category-card.active-special {
            background-color: var(--primary);
            color: #000;
        }

        .category-card.active-special .cat-meta,
        .category-card.active-special h2 {
            color: #000;
        }

        .category-card.active-special .cat-btn {
            background-color: #000;
            color: #fff;
        }

        .category-card:hover {
            transform: translateY(-5px);
        }

        .cat-meta {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .category-card h2 {
            font-size: 22px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 15px;
        }

        .cat-btn {
            align-self: flex-start;
            background-color: var(--bg-input);
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            border: none;
            color: #fff;
            border-radius: 2px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- Bloque Compra por Marca --- */
        .brands-container {
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 40px;
        }

        .brands-tabs {
            display: flex;
            gap: 15px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
            margin-bottom: 15px;
            overflow-x: auto;
        }

        .brand-tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 6px 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            transition: var(--transition);
        }

        .brand-tab-btn.active, .brand-tab-btn:hover {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .brands-display-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .brand-pill {
            background-color: var(--bg-input);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .brand-pill:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* --- Bloque Productos Destacados / Novedades --- */
        .products-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .product-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }

        .tab-btn {
            background-color: var(--bg-card);
            border: 1px solid #222;
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: var(--transition);
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: var(--primary);
            color: #000;
            border-color: var(--primary);
            font-weight: bold;
        }

        .grid-products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            background-color: var(--bg-card);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-img-wrapper {
            width: 100%;
            height: 240px;
            background-color: #1f1f1f;
            position: relative;
        }

        .product-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge-new {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: var(--primary);
            color: #000;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 2px;
            text-transform: uppercase;
        }

        .product-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .prod-brand {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .prod-title {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.3;
            height: 40px;
            overflow: hidden;
        }

        .prod-meta-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .tag-pill {
            font-size: 10px;
            background-color: #222;
            padding: 2px 6px;
            border-radius: 2px;
            color: var(--text-muted);
        }

        .prod-price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 10px;
        }

        .prod-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        /* --- Panel de Administración --- */
        .admin-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .admin-modal {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 6px;
            border: 1px solid #333;
            padding: 25px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid #333;
            padding: 10px;
            color: #fff;
            border-radius: 4px;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
        }

        .conditional-box {
            background-color: #1c1c1c;
            padding: 15px;
            border-radius: 4px;
            border-left: 3px solid var(--primary);
            margin-top: 10px;
            display: none;
        }

        .btn-submit {
            background-color: var(--primary);
            color: #000;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        /* --- Footer Informativo --- */
        footer {
            margin-top: 60px;
            border-top: 1px solid #222;
            background-color: var(--bg-card);
            padding: 40px 20px;
        }

        .footer-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
        }

        .footer-box h3 {
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .footer-box p {
            font-size: 14px;
            color: #fff;
            font-weight: bold;
        }

        .footer-box span {
            display: block;
            background-color: var(--bg-input);
            padding: 10px;
            border-radius: 4px;
            margin-top: 5px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <!-- BARRA DE NAVEGACIÓN -->
    <header>
        <div class="nav-container">
            <a href="#" class="logo" onclick="resetearFiltros()">KUSTOM<span>.</span></a>
            <div class="search-box">
                <input type="text" id="globalSearch" placeholder="Buscar por producto, marca o tipo..." onkeyup="ejecutarBusqueda(event)">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <div class="nav-actions">
                <button class="nav-btn" onclick="abrirAdmin()" title="Administrador"><i class="fa-solid fa-user-gear"></i></button>
            </div>
        </div>
    </header>

    <!-- CUERPO PRINCIPAL -->
    <main>
        
        <!-- SECCIÓN: COMPRA POR CATEGORÍA -->
        <div class="section-title">Compra por categoría</div>
        <div class="grid-categories" id="categoriesWrapper">
            <div class="category-card active-special" onclick="filtrarPorBloqueCategoria('Ofertas Especiales')">
                <div>
                    <div class="cat-meta">Descuentos</div>
                    <h2>OFERTAS ESPECIALES</h2>
                </div>
                <button class="cat-btn">▶ Ver ofertas</button>
            </div>
            <div class="category-card" onclick="filtrarPorBloqueCategoria('Tenis')">
                <div>
                    <div class="cat-meta">Nueva Colección</div>
                    <h2>TENIS</h2>
                </div>
                <button class="cat-btn">▶ Ver productos</button>
            </div>
            <div id="dynamicCategories" style="display: contents;"></div>
        </div>

        <!-- SECCIÓN: COMPRA POR MARCA -->
        <div class="section-title">Compra por marca</div>
        <div class="brands-container">
            <div class="brands-tabs" id="brandsCategoryTabs">
                <button class="brand-tab-btn active" onclick="cambiarFiltroMarcaCategoria('Tenis', this)">Tenis</button>
                <button class="brand-tab-btn" onclick="cambiarFiltroMarcaCategoria('Ropa', this)">Ropa</button>
                <button class="brand-tab-btn" onclick="cambiarFiltroMarcaCategoria('Calzado', this)">Calzado</button>
                <button class="brand-tab-btn" onclick="cambiarFiltroMarcaCategoria('Botas', this)">Botas</button>
                <button class="brand-tab-btn" onclick="cambiarFiltroMarcaCategoria('Accesorios', this)">Accesorios</button>
                <button class="brand-tab-btn" onclick="cambiarFiltroMarcaCategoria('Complementos', this)">Complementos</button>
            </div>
            <div class="brands-display-list" id="brandsContainerList"></div>
        </div>

        <!-- SECCIÓN: PRODUCTOS DESTACADOS / CATÁLOGO -->
        <div class="products-section-header">
            <div class="section-title" id="catalogoTitulo">Productos destacados</div>
            <div class="product-tabs" id="marcaDinamicaTabs">
                <button class="tab-btn active" id="tabTodo" onclick="filtrarSubPestaña('Todo', this)">Todo (Novedades)</button>
            </div>
        </div>

        <div class="grid-products" id="productsCatalogContainer"></div>

    </main>

    <!-- FOOTER INFORMATIVO -->
    <footer>
        <div class="footer-grid">
            <div class="footer-box">
                <h3><i class="fa-brands fa-whatsapp" style="color: #25D366;"></i> Whatsapp</h3>
                <p><span>+591 65142115</span><span>+591 65102615</span></p>
            </div>
            <div class="footer-box">
                <h3><i class="fa-brands fa-instagram" style="color: #E1306C;"></i> Instagram</h3>
                <p><span>@kustom.bo</span></p>
            </div>
            <div class="footer-box">
                <h3><i class="fa-solid fa-location-dot" style="color: #FF0000;"></i> Ubicación</h3>
                <p><span>La Paz, Bolivia</span></p>
            </div>
            <div class="footer-box">
                <h3><i class="fa-solid fa-clock"></i> Horario</h3>
                <p><span>Lun-Sáb 24h</span></p>
            </div>
        </div>
    </footer>

    <!-- INTERFAZ DEL ADMINISTRADOR (MODAL) -->
    <div class="admin-overlay" id="adminOverlay">
        <div class="admin-modal">
            <div class="admin-header">
                <h2>Panel de Control KUSTOM</h2>
                <button class="nav-btn" onclick="cerrarAdmin()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="productForm" onsubmit="guardarProducto(event)">
                <div class="form-group">
                    <label>Nombre del Producto</label>
                    <input type="text" id="prodName" required placeholder="Ej: Camisa Slim Fit">
                </div>
                <div class="form-group">
                    <label>Marca</label>
                    <input type="text" id="prodBrandField" required placeholder="Ej: Adidas, Nike, Varios">
                </div>
                <div class="form-group">
                    <label>Precio (Bs.)</label>
                    <input type="number" id="prodPrice" required placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>URL de la Imagen</label>
                    <input type="url" id="prodImg" required placeholder="https://ejemplo.com/imagen.jpg">
                </div>
                <div class="form-group">
                    <label>Área / Categoría Principal</label>
                    <select id="prodCategory" required onchange="evaluarCamposCondicionales()">
                        <option value="Tenis">Tenis</option>
                        <option value="Calzado">Calzado (Formal, Sandalias, etc.)</option>
                        <option value="Ropa">Ropa</option>
                        <option value="Botas">Botas</option>
                        <option value="Accesorios">Accesorios</option>
                        <option value="Complementos">Complementos</option>
                        <option value="Ropa Interior">Ropa Interior (Oculto hasta stock)</option>
                        <option value="Ropa de Dormir">Ropa de Dormir (Oculto hasta stock)</option>
                    </select>
                </div>

                <div class="conditional-box" id="boxCamposRopa">
                    <div class="form-group">
                        <label>Género (Ropa)</label>
                        <select id="clothingGender">
                            <option value="Varón">Varón</option>
                            <option value="Mujer">Mujer</option>
                            <option value="Unisex">Unisex</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tipo de Prenda</label>
                        <input type="text" id="clothingType" placeholder="Ej: Camisa, Polera, Jean, Vestido">
                    </div>
                </div>

                <div class="form-group">
                    <label>Estación / Temporada (Aplica a Ropa y Botas)</label>
                    <select id="prodSeason">
                        <option value="Ninguna">Ninguna / Regular</option>
                        <option value="Primavera">Primavera</option>
                        <option value="Otoño">Otoño</option>
                        <option value="Verano">Verano</option>
                        <option value="Invierno">Invierno</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>¿Se encuentra en Oferta Especial?</label>
                    <select id="prodIsOffer">
                        <option value="No">No</option>
                        <option value="Si">Sí, aplicar a Ofertas Especiales</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">Guardar e Implementar Producto</button>
            </form>
        </div>
    </div>

    <!-- LÓGICA DE CONTROL DE LA TIENDA -->
    <script>
        // CONFIGURACIÓN ASIGNADA DE TU PROYECTO
        const SUPABASE_URL = "https://xtxaurlrtoswghjqxcfo.supabase.co"; 
        
        // El código intenta leer la clave dinámicamente o usa un fallback seguro de renderizado
        const SUPABASE_KEY = window.localStorage.getItem('sb_anon_key') || "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0eGF1cmxydG9zd2doanF4Y2ZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTgzODg4MDAsImV4cCI6MjAzMzk2NDgwMH0.placeholder";
        
        const supabase = (SUPABASE_KEY && !SUPABASE_KEY.includes("placeholder")) 
            ? supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY) 
            : null;

        // Base de datos inteligente local en caso de inicialización sin conexión remota directa
        let localProductsDB = [
            { id: 1, name: "Zapatilla Urbana Casual", brand: "Adidas", price: 480, img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500", category: "Tenis", season: "Ninguna", isOffer: "No", created_at: new Date().toISOString(), clothingGender: "", clothingType: "" },
            { id: 2, name: "Chaqueta Térmica de Invierno", brand: "Nike", price: 350, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500", category: "Ropa", season: "Invierno", isOffer: "No", created_at: new Date().toISOString(), clothingGender: "Unisex", clothingType: "Chaqueta" },
            { id: 3, name: "Zapatos Formales Derby", brand: "Caterpillar", price: 600, img: "https://images.unsplash.com/photo-1533867617858-e7b97e060509?w=500", category: "Calzado", season: "Ninguna", isOffer: "Si", created_at: new Date(Date.now() - 3 * 24 * 60 * 60 * 1000).toISOString(), clothingGender: "", clothingType: "" }
        ];

        let filtroCategoriaActual = null;
        let filtroMarcaCategoriaActiva = 'Tenis';
        let subPestañaActiva = 'Todo';

        document.addEventListener("DOMContentLoaded", () => {
            inicializarTienda();
        });

        async function inicializarTienda() {
            let productos = [];
            try {
                if (supabase) {
                    let { data, error } = await supabase.from('productos').select('*');
                    if (!error && data && data.length > 0) {
                        productos = data;
                        localProductsDB = data; // Sincroniza
                    } else { productos = localProductsDB; }
                } else { productos = localProductsDB; }
            } catch(e) {
                productos = localProductsDB;
            }

            renderizarCategoriasDinamicas(productos);
            renderizarMarcasFiltro(productos);
            renderizarTabsSubMarcas(productos);
            renderizarCatalogoProductos(productos);
        }

        function evaluarCamposCondicionales() {
            const categoria = document.getElementById("prodCategory").value;
            document.getElementById("boxCamposRopa").style.display = (categoria === "Ropa") ? "block" : "none";
        }

        function renderizarCategoriasDinamicas(productos) {
            const container = document.getElementById("dynamicCategories");
            container.innerHTML = "";
            const poolCategorias = ["Calzado", "Botas", "Accesorios", "Complementos", "Ropa Interior", "Ropa de Dormir", "Ropa"];
            
            let categoriasConStock = new Set();
            productos.forEach(p => { if(p.category !== "Tenis") categoriasConStock.add(p.category); });

            poolCategorias.forEach(cat => {
                if (categoriasConStock.has(cat)) {
                    if (cat === "Ropa") {
                        let estacionesDeRopa = new Set();
                        productos.filter(p => p.category === "Ropa" && p.season !== "Ninguna").forEach(p => estacionesDeRopa.add(p.season));
                        estacionesDeRopa.forEach(estacion => {
                            container.innerHTML += `
                                <div class="category-card" onclick="filtrarPorTemporada('${estacion}')">
                                    <div><div class="cat-meta">Colección</div><h2>ROPA DE ${estacion.toUpperCase()}</h2></div>
                                    <button class="cat-btn">▶ Ver Ropa</button>
                                </div>`;
                        });
                    }
                    container.innerHTML += `
                        <div class="category-card" onclick="filtrarPorBloqueCategoria('${cat}')">
                            <div><div class="cat-meta">Disponibles</div><h2>${cat.toUpperCase()}</h2></div>
                            <button class="cat-btn">▶ Ver sección</button>
                        </div>`;
                }
            });
        }

        function renderizarMarcasFiltro(productos) {
            const listContainer = document.getElementById("brandsContainerList");
            listContainer.innerHTML = "";
            let marcasSet = new Set();
            productos.forEach(p => { if (p.category === filtroMarcaCategoriaActiva && p.brand) marcasSet.add(p.brand); });

            if(marcasSet.size === 0) {
                listContainer.innerHTML = `<div style="font-size:13px; color:var(--text-muted);">No hay marcas con stock en ${filtroMarcaCategoriaActiva}.</div>`;
                return;
            }
            marcasSet.forEach(marca => {
                listContainer.innerHTML += `<div class="brand-pill" onclick="filtrarPorMarcaEspecifica('${marca}', '${filtroMarcaCategoriaActiva}')">${marca}</div>`;
            });
        }

        function cambiarFiltroMarcaCategoria(categoria, elemento) {
            document.querySelectorAll(".brand-tab-btn").forEach(btn => btn.classList.remove("active"));
            elemento.classList.add("active");
            filtroMarcaCategoriaActiva = categoria;
            renderizarMarcasFiltro(localProductsDB);
        }

        function renderizarTabsSubMarcas(productos) {
            const tabsContainer = document.getElementById("marcaDinamicaTabs");
            tabsContainer.innerHTML = `<button class="tab-btn ${subPestañaActiva === 'Todo' ? 'active' : ''}" id="tabTodo" onclick="filtrarSubPestaña('Todo', this)">Todo (Novedades)</button>`;
            let marcasHistoricas = new Set();
            productos.forEach(p => {
                const dias = (new Date() - new Date(p.created_at)) / (1000 * 60 * 60 * 24);
                if (dias >= 2 && p.brand) marcasHistoricas.add(p.brand);
            });
            marcasHistoricas.forEach(marca => {
                tabsContainer.innerHTML += `<button class="tab-btn ${subPestañaActiva === marca ? 'active' : ''}" onclick="filtrarSubPestaña('${marca}', this)">${marca}</button>`;
            });
        }

        function renderizarCatalogoProductos(productos) {
            const container = document.getElementById("productsCatalogContainer");
            container.innerHTML = "";
            let filtrados = [...productos];

            if (filtroCategoriaActual) {
                if (filtroCategoriaActual === "Ofertas Especiales") filtrados = filtrados.filter(p => p.isOffer === "Si");
                else if (filtroCategoriaActual.startsWith("TEMP:")) {
                    let temp = filtroCategoriaActual.split(":")[1];
                    filtrados = filtrados.filter(p => p.season === temp);
                } else filtrados = filtrados.filter(p => p.category === filtroCategoriaActual);
            }

            if (subPestañaActiva === "Todo") {
                filtrados = filtrados.filter(p => ((new Date() - new Date(p.created_at)) / (1000 * 60 * 60 * 24)) < 2);
                document.getElementById("catalogoTitulo").innerText = "Productos destacados (Novedades 2 días)";
            } else {
                filtrados = filtrados.filter(p => p.brand === subPestañaActiva);
                document.getElementById("catalogoTitulo").innerText = `Catálogo - ${subPestañaActiva}`;
            }

            if(filtrados.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px 0;">No hay artículos en esta selección.</div>`;
                return;
            }

            filtrados.forEach(p => {
                const esNovedad = ((new Date() - new Date(p.created_at)) / (1000 * 60 * 60 * 24)) < 2;
                container.innerHTML += `
                    <div class="product-card">
                        <div class="product-img-wrapper">
                            ${esNovedad ? `<span class="badge-new">Nuevo</span>` : ''}
                            <img src="${p.img}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1531315630201-bb15abeb1653?w=500'">
                        </div>
                        <div class="product-info">
                            <div class="prod-brand">${p.brand}</div>
                            <div class="prod-title">${p.name}</div>
                            <div class="prod-meta-tags">
                                <span class="tag-pill">${p.category}</span>
                                ${p.clothingGender ? `<span class="tag-pill">${p.clothingGender}</span>` : ''}
                                ${p.clothingType ? `<span class="tag-pill">${p.clothingType}</span>` : ''}
                                ${p.season !== 'Ninguna' ? `<span class="tag-pill"><i class="fa-solid fa-cloud-sun"></i> ${p.season}</span>` : ''}
                            </div>
                            <div class="prod-price-row"><div class="prod-price">${p.price} Bs.</div></div>
                        </div>
                    </div>`;
            });
        }

        function filtrarPorBloqueCategoria(cat) { filtroCategoriaActual = cat; subPestañaActiva = "Todo"; inicializarTienda(); }
        function filtrarPorTemporada(est) { filtroCategoriaActual = `TEMP:${est}`; subPestañaActiva = "Todo"; inicializarTienda(); }
        function filtrarPorMarcaEspecifica(m, cat) { subPestañaActiva = m; filtroCategoriaActual = cat; inicializarTienda(); }
        function filtrarSubPestaña(tipo, el) { subPestañaActiva = tipo; inicializarTienda(); }
        function resetearFiltros() { filtroCategoriaActual = null; subPestañaActiva = "Todo"; document.getElementById("globalSearch").value = ""; inicializarTienda(); }

        function ejecutarBusqueda(e) {
            const cad = document.getElementById("globalSearch").value.toLowerCase().trim();
            let res = localProductsDB.filter(p => p.name.toLowerCase().includes(cad) || p.brand.toLowerCase().includes(cad) || p.category.toLowerCase().includes(cad));
            renderizarCatalogoProductos(res);
        }

        function abrirAdmin() { document.getElementById("adminOverlay").style.display = "flex"; evaluarCamposCondicionales(); }
        function cerrarAdmin() { document.getElementById("adminOverlay").style.display = "none"; document.getElementById("productForm").reset(); }

        async function guardarProducto(e) {
            e.preventDefault();
            const nuevo = {
                name: document.getElementById("prodName").value,
                brand: document.getElementById("prodBrandField").value,
                price: parseFloat(document.getElementById("prodPrice").value),
                img: document.getElementById("prodImg").value,
                category: document.getElementById("prodCategory").value,
                season: document.getElementById("prodSeason").value,
                isOffer: document.getElementById("prodIsOffer").value,
                created_at: new Date().toISOString(),
                clothingGender: document.getElementById("prodCategory").value === "Ropa" ? document.getElementById("clothingGender").value : "",
                clothingType: document.getElementById("prodCategory").value === "Ropa" ? document.getElementById("clothingType").value : ""
            };

            if (supabase) {
                await supabase.from('productos').insert([nuevo]);
            }
            localProductsDB.push(nuevo);
            alert("¡Producto añadido exitosamente!");
            cerrarAdmin();
            inicializarTienda();
        }
    </script>
</body>
</html>
